<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante Ficticio</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<!-- botones de filtro-->
 <section class="section-filtros">
    
  </section>

  <!-- sección del menú -->
<section class="section-menu">
    <div class="container">
      <h2>Menú del Restaurante</h2>
      <div class="container">
        <div class="btn-group" role="group">
          <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked onclick="filtrarCategoria('Todos')">
          <label class="btn btn-outline-primary" for="btnradio1">Todos</label>
          
          <input type="radio" class="btn-check" name="btnradio" id="filtro-entradas" autocomplete="off" checked onclick="filtrarCategoria('Entrada')">
          <label class="btn btn-secondary" for="filtro-entradas">Entradas</label>
          
          <input type="radio" class="btn-check" name="btnradio" id="filtro-plato-fuerte" autocomplete="off" checked onclick="filtrarCategoria('Plato Fuerte')">
          <label class="btn btn-secondary" for="filtro-plato-fuerte">Platos Fuertes</label>
          
          <input type="radio" class="btn-check" name="btnradio" id="filtro-postre" autocomplete="off" checked onclick="filtrarCategoria('Postre')">
          <label class="btn btn-secondary" for="filtro-postre">Postres</label>
        </div>
      </div>
      <div class="row g-4" id="menu-container">
        <!-- menu dinámico -->
      </div>
    </div>
  </section>
  
  
  <!-- formulario de reserva -->
   <section class="section-reserva">
    <div class="container">
      <h2>Reserva</h2>
      <form id="form-reserva" novalidate>
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo:</label>
          <input id="nombre" type="text" class="form-control" />
          <div id="nombre-error" class="error-campo"></div>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico:</label>
          <input id="email" type="email" class="form-control" />
          <div id="email-error" class="error-campo"></div>
        </div>
        <div class="mb-3">
          <label for="fecha" class="form-label">Fecha de reserva:</label>
          <input id="fecha" type="date" class="form-control" />
          <div id="fecha-error" class="error-campo"></div>
        </div>
        <div class="mb-3">
          <label for="hora" class="form-label">Hora:</label>
          <select id="hora" class="form-select">
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
          </select>
          <div id="hora-error" class="error-campo"></div>
        </div>
        <div class="mb-3">
          <label for="numPersonas" class="form-label">Número de personas:</label>
          <input id="numPersonas" type="number" class="form-control" />
          <div id="numPersonas-error" class="error-campo"></div>
        </div>
        <div class="mb-3">
          <label for="comentarios" class="form-label">Comentarios:</label>
          <textarea id="comentarios" class="form-control" rows="3"></textarea>
          <div id="comentarios-error" class="error-campo"></div>
        </div>
        <button id="btn-reservar" type="submit" class="btn" disabled onclick="agregarReserva()">Reservar</button>
      </form>
    </div>
  </section>
  <section id="tabla-reservas">
    <div class="container">
      <h2>Reservas Realizadas</h2>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Número de Personas</th>
            <th>Comentarios</th>
          </tr>
        </thead>
        <tbody id="reservas-body">
          <!-- reservas dinámicamente -->
        </tbody>
      </table>
    </div>
  </section>
  <section>
    <div class="container mt-4">
      <div class="resumen-reservas p-3 border rounded bg-light">
        <h3>Resumen de Reservas</h3>
        <ul>
          <li>Total de reservas registradas: <strong id="total-reservas">0</strong></li>
          <li>Total de personas esperadas: <strong id="total-personas">0</strong></li>
          <li>Reserva con mayor número de personas: <strong id="mayor-reserva-info">Ninguna</strong></li>
        </ul>
      </div>
    </div>

  </section>

  <script src="js/app.js"></script>
</body>
</html>
